<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Футбольный манеж «Центр Поля»</title>
<meta name="description" content="Футбольный манеж «Центр Поля» — 3 футбольные площадки, игры 5х5, 6х6, 7х7, 8х8. Бронирование по телефону.">

<link href="fonts/inter.css" rel="stylesheet">

<style>
  /* ============ ШРИФТЫ (только фирменные) ============ */
  @font-face{font-family:'Gros Ventre';src:url('fonts/Gros-Ventre-Bold.ttf') format('truetype');font-weight:700;font-display:swap;}
  @font-face{font-family:'Gros Ventre';src:url('fonts/Gros-Ventre-Semibold.ttf') format('truetype');font-weight:600;font-display:swap;}
  @font-face{font-family:'Gros Ventre';src:url('fonts/Gros-Ventre-Regular.ttf') format('truetype');font-weight:400;font-display:swap;}

  /* ============ ПЕРЕМЕННЫЕ ============ */
  :root{
    /* Палитра гайдлайна — только эти цвета */
    --color--green:  #198300;
    --color--yellow: #E06D06;
    --color--black:  #000000;
    --color--white:  #FFFFFF;
    /* Линии сетки — фирменный белый с прозрачностью */
    --line--soft: rgba(255,255,255,0.16);

    /* Типографика */
    --font--heading: 'Gros Ventre', sans-serif;
    --font--body: 'Inter', sans-serif;

    /* Структура hero */
    --hero--edge-pad: clamp(1.125rem, 3vw, 2.5rem);
    --hero--row-top: 4.5rem;
    --hero--row-bottom: 5.25rem;
  }

  /* ============ БАЗА ============ */
  *{margin:0;padding:0;box-sizing:border-box;}
  html{font-size:100%;overflow-x:hidden;}
  html,body{height:100%;}

  .page-wrapper{
    font-family:var(--font--body);
    color:var(--color--white);
    background-color:var(--color--black);
    min-height:100%;
    text-transform:uppercase;
    -webkit-font-smoothing:antialiased;
  }
  .main-wrapper{height:100%;}

  /* ============ УТИЛИТЫ ============ */
  .button{
    display:inline-flex;align-items:center;gap:0.4375rem;
    font-family:var(--font--heading);font-weight:700;
    font-size:0.8125rem;letter-spacing:0.04em;text-transform:uppercase;
    text-decoration:none;white-space:nowrap;
    padding:0.625rem 1.125rem;border-radius:62.5rem;
    background-color:var(--color--yellow);color:var(--color--black);
  }
  .button.is-white{background-color:var(--color--white);color:var(--color--green);}
  .button.is-large{font-size:0.9375rem;padding:0.8125rem 1.75rem;margin-top:0.25rem;}

  /* утилиты видимости по брейкпоинтам */
  .u-mobile-only{display:none;}
  .u-mobile-inline{display:none;}

  /* ============ HERO ============ */
  .section_hero{height:100%;}

  .hero_frame{
    position:relative;
    width:100%;
    min-height:100vh;
    background:var(--color--green) url('bg-2.png') center / cover no-repeat;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    isolation:isolate;
  }

  /* модульная сетка */
  .hero_grid{position:absolute;inset:0;z-index:1;pointer-events:none;}
  .hero_grid-border{position:absolute;inset:0;border:0.0625rem solid var(--line--soft);}
  .hero_grid-line{position:absolute;background-color:var(--line--soft);}
  .hero_grid-line.is-vertical{top:0;bottom:0;width:0.0625rem;}
  .hero_grid-line.is-horizontal{left:0;right:0;height:0.0625rem;}
  .hero_grid-line.is-v1{left:33.333%;}
  .hero_grid-line.is-v2{left:66.666%;}
  .hero_grid-line.is-h-top{top:var(--hero--row-top);}
  .hero_grid-line.is-h-bottom{bottom:var(--hero--row-bottom);}

  .hero_topbar,.hero_content,.hero_bottombar{position:relative;z-index:2;}

  /* верхний бар */
  .hero_topbar{
    flex:none;height:var(--hero--row-top);
    display:flex;align-items:center;justify-content:space-between;
    padding-left:var(--hero--edge-pad);padding-right:var(--hero--edge-pad);
  }
  .hero_brand{display:flex;align-items:center;gap:0.875rem;}
  .hero_logo{height:2.75rem;width:auto;}
  .hero_actions{display:flex;align-items:center;gap:0.75rem;}

  /* центр */
  .hero_content{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:0.75rem;
    padding:2rem var(--hero--edge-pad);
  }
  .hero_eyebrow{
    font-weight:600;font-size:clamp(0.6875rem,1vw,0.8125rem);letter-spacing:0.28em;
    color:var(--color--white);
  }
  .hero_heading{
    font-family:var(--font--heading);font-weight:700;
    font-size:clamp(3rem,9.5vw,8rem);line-height:0.86;letter-spacing:-0.01em;
  }
  .hero_subtext{font-size:clamp(0.8125rem,1.3vw,1rem);font-weight:500;color:var(--color--white);}

  /* нижний бар */
  .hero_bottombar{
    flex:none;min-height:var(--hero--row-bottom);
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1.25rem;
    padding:1.125rem var(--hero--edge-pad);
  }
  .hero_bottombar > .button{justify-self:center;}
  .hero_info{display:flex;align-items:center;gap:0.875rem;}
  .hero_info.is-right{justify-content:flex-end;text-align:right;}
  .hero_info-text{display:flex;flex-direction:column;line-height:1.3;}
  .hero_info-title{font-weight:700;font-size:0.75rem;letter-spacing:0.06em;text-transform:uppercase;}
  .hero_info-value{font-size:0.75rem;color:var(--color--white);}
  .hero_info-link{color:var(--color--white);text-decoration:none;}
  .hero_info-link:hover{text-decoration:underline;text-underline-offset:0.1875rem;}

  /* ============ АДАПТИВ ============ */
  @media (max-width:61.9375rem){
    :root{--hero--row-top:4.625rem;}
    .hero_grid{display:none;}
    .hero_logo{height:2.25rem;width:auto;}
    .hero_heading{font-size:clamp(3.5rem,19vw,7.5rem);}
    .hero_bottombar{grid-template-columns:1fr;gap:1.25rem;padding-bottom:1.5rem;}
    .hero_info,.hero_info.is-right{justify-content:center;text-align:center;}
    /* видимость кнопки «адрес»: в шапке на мобилке, снизу — только десктоп */
    .u-mobile-only{display:inline-flex;}
    .u-desktop-only{display:none;}
    .u-mobile-inline{display:inline;}
    .u-desktop-inline{display:none;}
    /* уменьшаем кнопки в шапке, чтобы три влезли */
    .hero_actions{gap:0.375rem;}
    .hero_actions .button{font-size:0.6875rem;padding:0.5rem 0.75rem;gap:0.3125rem;}
    .hero_actions .button svg{width:0.875rem;height:0.875rem;}
  }
</style>
</head>
<body class="page-wrapper">
  <main class="main-wrapper">
    <section class="section_hero">
      <div class="hero_frame">

        <div class="hero_grid" aria-hidden="true">
          <div class="hero_grid-border"></div>
          <div class="hero_grid-line is-vertical is-v1"></div>
          <div class="hero_grid-line is-vertical is-v2"></div>
          <div class="hero_grid-line is-horizontal is-h-top"></div>
          <div class="hero_grid-line is-horizontal is-h-bottom"></div>
        </div>

        <header class="hero_topbar">
          <div class="hero_brand">
            <img class="hero_logo" src="logo-white.svg" alt="Центр Поля">
          </div>
          <nav class="hero_actions">
            <a class="button is-white" href="https://vk.ru/club238920313" target="_blank" rel="noopener">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M13.16 18.06c-6.84 0-10.74-4.69-10.9-12.5h3.43c.11 5.73 2.64 8.16 4.64 8.66V5.56h3.23v4.94c1.98-.21 4.06-2.46 4.76-4.94h3.23c-.54 3.06-2.79 5.31-4.39 6.24 1.6.75 4.16 2.71 5.13 6.26h-3.56c-.76-2.36-2.66-4.19-5.2-4.44v4.44h-.39Z"/></svg>
              <span class="u-desktop-inline">ВКонтакте</span><span class="u-mobile-inline">ВК</span>
            </a>
            <a class="button is-accent" href="tel:+79813799009"><span class="u-desktop-inline">Бронирование</span><span class="u-mobile-inline">Бронь</span></a>
            <a class="button is-white u-mobile-only" href="https://yandex.ru/navi?whatshere%5Bzoom%5D=18&whatshere%5Bpoint%5D=30.084870,59.787184&si=9bc3xuj8qr6jay2fcb7mz8nx4r" target="_blank" rel="noopener">Адрес</a>
          </nav>
        </header>

        <div class="hero_content">
          <div class="hero_eyebrow">Футбольный манеж</div>
          <h1 class="hero_heading">Центр<br>Поля</h1>
          <p class="hero_subtext">Игры в формате&nbsp; 5×5 · 6×6 · 7×7 · 8×8</p>
          <a class="button is-accent is-large" href="tel:+79813799009">Бронирование</a>
        </div>

        <footer class="hero_bottombar">
          <div class="hero_info">
            <span class="hero_info-text">
              <span class="hero_info-title">3 футбольные площадки</span>
              <span class="hero_info-value">38×19 · 42×22 · 42×64</span>
            </span>
          </div>

          <a class="button is-white u-desktop-only" href="https://yandex.ru/navi?whatshere%5Bzoom%5D=18&whatshere%5Bpoint%5D=30.084870,59.787184&si=9bc3xuj8qr6jay2fcb7mz8nx4r" target="_blank" rel="noopener">Адрес на карте</a>

          <div class="hero_info is-right">
            <span class="hero_info-text">
              <span class="hero_info-title">Вопросы и бронь</span>
              <a class="hero_info-link" href="tel:+79813799009">+7-981-379-90-09</a>
            </span>
          </div>
        </footer>

      </div>
    </section>
  </main>
</body>
</html>
